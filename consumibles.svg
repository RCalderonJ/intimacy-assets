<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1510"/>
      <stop offset="100%" stop-color="#0d1a10"/>
    </linearGradient>
    <linearGradient id="accent-c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5cad7c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5cad7c"/>
      <stop offset="100%" stop-color="#5cad7c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmer-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8dfc5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#b8dfc5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottle-fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a8f5c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5cad7c" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="600" height="400" fill="url(#bg-c)"/>
  <rect width="600" height="200" fill="url(#shimmer-c)"/>

  <!-- Decoración: líneas diagonales sutiles -->
  <g opacity="0.06" stroke="#5cad7c" stroke-width="0.5">
    <line x1="0" y1="0" x2="200" y2="400"/>
    <line x1="100" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="600" y2="400"/>
    <line x1="500" y1="0" x2="700" y2="400"/>
  </g>

  <!-- Decoración: círculos concéntricos fondo -->
  <circle cx="300" cy="200" r="260" fill="none" stroke="#5cad7c" stroke-width="0.5" opacity="0.06"/>
  <circle cx="300" cy="200" r="200" fill="none" stroke="#5cad7c" stroke-width="0.5" opacity="0.08"/>

  <!-- Ilustración: 3 frascos / productos estilizados -->
  <!-- Frasco izquierdo (pequeño, aceite) -->
  <g transform="translate(228, 195)" opacity="0.85">
    <!-- cuerpo -->
    <rect x="-14" y="-70" width="28" height="85" rx="8" fill="url(#bottle-fill)" stroke="#5cad7c" stroke-width="1" opacity="0.7"/>
    <!-- cuello -->
    <rect x="-7" y="-88" width="14" height="22" rx="4" fill="none" stroke="#5cad7c" stroke-width="0.9" opacity="0.7"/>
    <!-- tapa -->
    <rect x="-9" y="-100" width="18" height="15" rx="3" fill="#5cad7c" opacity="0.4"/>
    <rect x="-9" y="-100" width="18" height="15" rx="3" fill="none" stroke="#b8dfc5" stroke-width="0.8" opacity="0.7"/>
    <!-- etiqueta -->
    <rect x="-11" y="-45" width="22" height="28" rx="2" fill="none" stroke="#5cad7c" stroke-width="0.7" opacity="0.5"/>
    <line x1="-6" y1="-38" x2="6" y2="-38" stroke="#5cad7c" stroke-width="0.6" opacity="0.5"/>
    <line x1="-6" y1="-32" x2="6" y2="-32" stroke="#5cad7c" stroke-width="0.6" opacity="0.5"/>
    <line x1="-6" y1="-26" x2="2" y2="-26" stroke="#5cad7c" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Frasco central (grande, lubricante) -->
  <g transform="translate(300, 180)" opacity="0.9">
    <!-- cuerpo ovalado -->
    <rect x="-20" y="-95" width="40" height="115" rx="12" fill="url(#bottle-fill)" stroke="#5cad7c" stroke-width="1.2" opacity="0.8"/>
    <!-- cuello -->
    <rect x="-10" y="-115" width="20" height="24" rx="5" fill="none" stroke="#5cad7c" stroke-width="1" opacity="0.8"/>
    <!-- dispensador/bomba -->
    <rect x="-5" y="-130" width="10" height="18" rx="3" fill="none" stroke="#b8dfc5" stroke-width="0.9" opacity="0.7"/>
    <circle cx="0" cy="-135" r="6" fill="#5cad7c" opacity="0.4"/>
    <circle cx="0" cy="-135" r="6" fill="none" stroke="#b8dfc5" stroke-width="0.8" opacity="0.8"/>
    <!-- etiqueta -->
    <rect x="-16" y="-60" width="32" height="45" rx="3" fill="none" stroke="#5cad7c" stroke-width="0.8" opacity="0.5"/>
    <line x1="-10" y1="-50" x2="10" y2="-50" stroke="#b8dfc5" stroke-width="1" opacity="0.5"/>
    <line x1="-10" y1="-40" x2="10" y2="-40" stroke="#5cad7c" stroke-width="0.6" opacity="0.5"/>
    <line x1="-10" y1="-32" x2="10" y2="-32" stroke="#5cad7c" stroke-width="0.6" opacity="0.5"/>
    <line x1="-10" y1="-24" x2="4" y2="-24" stroke="#5cad7c" stroke-width="0.6" opacity="0.4"/>
    <!-- brillo -->
    <line x1="-10" y1="-90" x2="-10" y2="-55" stroke="#b8dfc5" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Frasco derecho (pequeño, crema) -->
  <g transform="translate(372, 195)" opacity="0.85">
    <!-- cuerpo redondo (tarro) -->
    <rect x="-16" y="-55" width="32" height="55" rx="10" fill="url(#bottle-fill)" stroke="#5cad7c" stroke-width="1" opacity="0.7"/>
    <!-- tapa plana -->
    <rect x="-16" y="-70" width="32" height="18" rx="8" fill="#5cad7c" opacity="0.3"/>
    <rect x="-16" y="-70" width="32" height="18" rx="8" fill="none" stroke="#b8dfc5" stroke-width="0.8" opacity="0.7"/>
    <!-- etiqueta en el tarro -->
    <rect x="-12" y="-42" width="24" height="22" rx="2" fill="none" stroke="#5cad7c" stroke-width="0.7" opacity="0.5"/>
    <line x1="-7" y1="-34" x2="7" y2="-34" stroke="#5cad7c" stroke-width="0.6" opacity="0.5"/>
    <line x1="-7" y1="-27" x2="4" y2="-27" stroke="#5cad7c" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Pequeñas gotas decorativas -->
  <g opacity="0.4">
    <ellipse cx="255" cy="250" rx="3" ry="5" fill="#5cad7c" transform="rotate(-15, 255, 250)"/>
    <ellipse cx="345" cy="245" rx="2" ry="4" fill="#5cad7c" transform="rotate(10, 345, 245)"/>
  </g>

  <!-- Línea superior -->
  <rect x="0" y="0" width="600" height="2" fill="url(#accent-c)" opacity="0.7"/>

  <!-- Categoría etiqueta superior -->
  <text x="300" y="52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" letter-spacing="5" fill="#5cad7c" opacity="0.9">INTIMACY</text>

  <!-- Nombre principal -->
  <text x="300" y="335" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="5" fill="#b8dfc5" font-weight="400">CONSUMIBLES</text>

  <!-- Línea decorativa -->
  <rect x="240" y="347" width="120" height="0.5" fill="url(#accent-c)"/>

  <!-- Subtítulo -->
  <text x="300" y="372" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="3" fill="#5cad7c" opacity="0.8">Lubricantes &amp; más</text>

  <!-- Borde sutil -->
  <rect x="1" y="1" width="598" height="398" fill="none" stroke="#5cad7c" stroke-width="0.5" opacity="0.2" rx="2"/>
</svg>
