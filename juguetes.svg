<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-j" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#130d22"/>
    </linearGradient>
    <linearGradient id="accent-j" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9b6fc9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9b6fc9"/>
      <stop offset="100%" stop-color="#9b6fc9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmer-j" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b8f0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4b8f0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow-center-j" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b6fc9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9b6fc9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="600" height="400" fill="url(#bg-j)"/>
  <rect width="600" height="400" fill="url(#glow-center-j)"/>
  <rect width="600" height="200" fill="url(#shimmer-j)"/>

  <!-- Decoración geométrica - grid de puntos -->
  <g opacity="0.12">
    <circle cx="60" cy="60" r="1.5" fill="#d4b8f0"/>
    <circle cx="100" cy="60" r="1.5" fill="#d4b8f0"/>
    <circle cx="140" cy="60" r="1.5" fill="#d4b8f0"/>
    <circle cx="460" cy="60" r="1.5" fill="#d4b8f0"/>
    <circle cx="500" cy="60" r="1.5" fill="#d4b8f0"/>
    <circle cx="540" cy="60" r="1.5" fill="#d4b8f0"/>
    <circle cx="60" cy="100" r="1.5" fill="#d4b8f0"/>
    <circle cx="100" cy="100" r="1.5" fill="#d4b8f0"/>
    <circle cx="460" cy="100" r="1.5" fill="#d4b8f0"/>
    <circle cx="500" cy="100" r="1.5" fill="#d4b8f0"/>
    <circle cx="540" cy="100" r="1.5" fill="#d4b8f0"/>
    <circle cx="60" cy="300" r="1.5" fill="#d4b8f0"/>
    <circle cx="100" cy="300" r="1.5" fill="#d4b8f0"/>
    <circle cx="460" cy="300" r="1.5" fill="#d4b8f0"/>
    <circle cx="500" cy="300" r="1.5" fill="#d4b8f0"/>
    <circle cx="540" cy="300" r="1.5" fill="#d4b8f0"/>
    <circle cx="60" cy="340" r="1.5" fill="#d4b8f0"/>
    <circle cx="100" cy="340" r="1.5" fill="#d4b8f0"/>
    <circle cx="460" cy="340" r="1.5" fill="#d4b8f0"/>
    <circle cx="500" cy="340" r="1.5" fill="#d4b8f0"/>
    <circle cx="540" cy="340" r="1.5" fill="#d4b8f0"/>
  </g>

  <!-- Ilustración: vibradora estilizada y abstracta -->
  <g transform="translate(300, 185)" opacity="0.85">
    <!-- Forma principal - cuerpo cilíndrico elegante -->
    <rect x="-22" y="-105" width="44" height="140" rx="22" fill="#9b6fc9" opacity="0.12"/>
    <rect x="-22" y="-105" width="44" height="140" rx="22" fill="none" stroke="#9b6fc9" stroke-width="1.2" opacity="0.7"/>
    <!-- Cabeza redondeada -->
    <ellipse cx="0" cy="-105" rx="22" ry="22" fill="#9b6fc9" opacity="0.2"/>
    <ellipse cx="0" cy="-105" rx="22" ry="22" fill="none" stroke="#d4b8f0" stroke-width="1" opacity="0.8"/>
    <!-- Líneas de detalle en el cuerpo -->
    <line x1="-22" y1="-50" x2="22" y2="-50" stroke="#9b6fc9" stroke-width="0.7" opacity="0.5"/>
    <line x1="-22" y1="-20" x2="22" y2="-20" stroke="#9b6fc9" stroke-width="0.7" opacity="0.5"/>
    <line x1="-22" y1="10" x2="22" y2="10" stroke="#9b6fc9" stroke-width="0.7" opacity="0.4"/>
    <!-- Botón/control -->
    <circle cx="0" cy="-35" r="8" fill="#9b6fc9" opacity="0.25"/>
    <circle cx="0" cy="-35" r="8" fill="none" stroke="#d4b8f0" stroke-width="0.8" opacity="0.6"/>
    <circle cx="0" cy="-35" r="3" fill="#d4b8f0" opacity="0.7"/>
    <!-- Base -->
    <rect x="-18" y="35" width="36" height="8" rx="4" fill="#9b6fc9" opacity="0.3"/>
    <rect x="-18" y="35" width="36" height="8" rx="4" fill="none" stroke="#9b6fc9" stroke-width="0.8" opacity="0.5"/>
    <!-- Brillos -->
    <line x1="-10" y1="-125" x2="-10" y2="-90" stroke="#d4b8f0" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Ondas de vibración -->
  <g transform="translate(300, 80)" opacity="0.3">
    <path d="M-40,0 C-30,-15 -10,-15 0,0 C10,15 30,15 40,0" fill="none" stroke="#9b6fc9" stroke-width="1"/>
    <path d="M-55,0 C-40,-22 -15,-22 0,0 C15,22 40,22 55,0" fill="none" stroke="#9b6fc9" stroke-width="0.7"/>
  </g>

  <!-- Línea de acento -->
  <rect x="0" y="0" width="600" height="2" fill="url(#accent-j)" opacity="0.7"/>

  <!-- Categoría etiqueta superior -->
  <text x="300" y="52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" letter-spacing="5" fill="#9b6fc9" opacity="0.9">INTIMACY</text>

  <!-- Nombre principal -->
  <text x="300" y="335" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" letter-spacing="6" fill="#d4b8f0" font-weight="400">JUGUETES</text>

  <!-- Línea decorativa -->
  <rect x="240" y="347" width="120" height="0.5" fill="url(#accent-j)"/>

  <!-- Subtítulo -->
  <text x="300" y="372" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="3" fill="#9b6fc9" opacity="0.8">Descubre el placer</text>

  <!-- Borde sutil -->
  <rect x="1" y="1" width="598" height="398" fill="none" stroke="#9b6fc9" stroke-width="0.5" opacity="0.2" rx="2"/>
</svg>
