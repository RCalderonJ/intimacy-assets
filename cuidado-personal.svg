<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140f0a"/>
      <stop offset="100%" stop-color="#1a120a"/>
    </linearGradient>
    <linearGradient id="accent-cp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a55a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a55a"/>
      <stop offset="100%" stop-color="#c9a55a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmer-cp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede0c4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ede0c4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow-gold" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#c9a55a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c9a55a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="600" height="400" fill="url(#bg-cp)"/>
  <rect width="600" height="400" fill="url(#glow-gold)"/>
  <rect width="600" height="200" fill="url(#shimmer-cp)"/>

  <!-- Decoración: patrón hexagonal sutil -->
  <g opacity="0.07" stroke="#c9a55a" stroke-width="0.5" fill="none">
    <polygon points="100,80 120,68 140,80 140,104 120,116 100,104" />
    <polygon points="460,80 480,68 500,80 500,104 480,116 460,104" />
    <polygon points="60,280 80,268 100,280 100,304 80,316 60,304" />
    <polygon points="500,280 520,268 540,280 540,304 520,316 500,304" />
  </g>

  <!-- Decoración horizontal fina -->
  <line x1="40" y1="200" x2="190" y2="200" stroke="#c9a55a" stroke-width="0.5" opacity="0.12"/>
  <line x1="410" y1="200" x2="560" y2="200" stroke="#c9a55a" stroke-width="0.5" opacity="0.12"/>

  <!-- Ilustración: hoja + flor + elemento spa/cuidado personal -->
  <g transform="translate(300, 185)">

    <!-- Hoja izquierda grande -->
    <path d="M-15,0 C-50,-40 -70,-90 -40,-115 C-20,-130 0,-100 0,-60 Z" fill="#c9a55a" opacity="0.12"/>
    <path d="M-15,0 C-50,-40 -70,-90 -40,-115 C-20,-130 0,-100 0,-60 Z" fill="none" stroke="#c9a55a" stroke-width="1" opacity="0.6"/>
    <!-- Nervio hoja izquierda -->
    <path d="M-15,0 C-30,-30 -45,-70 -40,-115" fill="none" stroke="#c9a55a" stroke-width="0.6" opacity="0.4"/>

    <!-- Hoja derecha grande -->
    <path d="M15,0 C50,-40 70,-90 40,-115 C20,-130 0,-100 0,-60 Z" fill="#c9a55a" opacity="0.12"/>
    <path d="M15,0 C50,-40 70,-90 40,-115 C20,-130 0,-100 0,-60 Z" fill="none" stroke="#c9a55a" stroke-width="1" opacity="0.6"/>
    <!-- Nervio hoja derecha -->
    <path d="M15,0 C30,-30 45,-70 40,-115" fill="none" stroke="#c9a55a" stroke-width="0.6" opacity="0.4"/>

    <!-- Hoja pequeña izquierda -->
    <path d="M-5,-10 C-35,-30 -55,-55 -35,-70 C-20,-78 -5,-55 -5,-35 Z" fill="none" stroke="#ede0c4" stroke-width="0.7" opacity="0.4"/>

    <!-- Hoja pequeña derecha -->
    <path d="M5,-10 C35,-30 55,-55 35,-70 C20,-78 5,-55 5,-35 Z" fill="none" stroke="#ede0c4" stroke-width="0.7" opacity="0.4"/>

    <!-- Flor central -->
    <!-- Pétalos -->
    <ellipse cx="0" cy="-125" rx="12" ry="20" fill="#c9a55a" opacity="0.3"/>
    <ellipse cx="0" cy="-125" rx="12" ry="20" fill="none" stroke="#c9a55a" stroke-width="0.8" opacity="0.7"/>
    <ellipse cx="0" cy="-125" rx="12" ry="20" fill="none" stroke="#c9a55a" stroke-width="0.8" opacity="0.7" transform="rotate(45, 0, -125)"/>
    <ellipse cx="0" cy="-125" rx="12" ry="20" fill="none" stroke="#c9a55a" stroke-width="0.8" opacity="0.7" transform="rotate(90, 0, -125)"/>
    <ellipse cx="0" cy="-125" rx="12" ry="20" fill="none" stroke="#c9a55a" stroke-width="0.8" opacity="0.7" transform="rotate(135, 0, -125)"/>
    <!-- Centro flor -->
    <circle cx="0" cy="-125" r="8" fill="#c9a55a" opacity="0.5"/>
    <circle cx="0" cy="-125" r="4" fill="#ede0c4" opacity="0.8"/>
    <circle cx="0" cy="-125" r="2" fill="#c9a55a" opacity="1"/>

    <!-- Tallos -->
    <line x1="0" y1="-60" x2="0" y2="0" stroke="#c9a55a" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="-105" x2="0" y2="-60" stroke="#c9a55a" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

    <!-- Pequeñas estrellas / destellos -->
    <g opacity="0.5">
      <line x1="-70" y1="-60" x2="-65" y2="-60" stroke="#ede0c4" stroke-width="1"/>
      <line x1="-67.5" y1="-62.5" x2="-67.5" y2="-57.5" stroke="#ede0c4" stroke-width="1"/>
      <line x1="65" y1="-80" x2="70" y2="-80" stroke="#ede0c4" stroke-width="1"/>
      <line x1="67.5" y1="-82.5" x2="67.5" y2="-77.5" stroke="#ede0c4" stroke-width="1"/>
      <circle cx="-55" cy="-100" r="1.5" fill="#ede0c4" opacity="0.6"/>
      <circle cx="55" cy="-45" r="1.5" fill="#ede0c4" opacity="0.6"/>
    </g>

    <!-- Base / tierra -->
    <path d="M-30,0 C-20,10 20,10 30,0" fill="none" stroke="#c9a55a" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Línea superior -->
  <rect x="0" y="0" width="600" height="2" fill="url(#accent-cp)" opacity="0.7"/>

  <!-- Puntos decorativos esquinas -->
  <circle cx="30" cy="30" r="1" fill="#ede0c4" opacity="0.3"/>
  <circle cx="570" cy="30" r="1" fill="#ede0c4" opacity="0.3"/>
  <circle cx="30" cy="370" r="1" fill="#ede0c4" opacity="0.3"/>
  <circle cx="570" cy="370" r="1" fill="#ede0c4" opacity="0.3"/>

  <!-- Categoría etiqueta superior -->
  <text x="300" y="52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" letter-spacing="5" fill="#c9a55a" opacity="0.9">INTIMACY</text>

  <!-- Nombre principal (dos líneas para que quepa) -->
  <text x="300" y="328" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" letter-spacing="5" fill="#ede0c4" font-weight="400">CUIDADO</text>
  <text x="300" y="358" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" letter-spacing="5" fill="#ede0c4" font-weight="400">PERSONAL</text>

  <!-- Línea decorativa -->
  <rect x="240" y="368" width="120" height="0.5" fill="url(#accent-cp)"/>

  <!-- Subtítulo -->
  <text x="300" y="388" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" letter-spacing="3" fill="#c9a55a" opacity="0.8">Rituales de bienestar</text>

  <!-- Borde sutil -->
  <rect x="1" y="1" width="598" height="398" fill="none" stroke="#c9a55a" stroke-width="0.5" opacity="0.2" rx="2"/>
</svg>
